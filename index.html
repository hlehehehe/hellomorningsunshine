<!doctype html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Thiệp mời</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Be Vietnam Pro', sans-serif;
background:#ffeef4;
color:#333;
}

.wrap{
max-width:700px;
margin:auto;
padding:40px 20px;
}

.card{
background:#ffffff;
border-radius:22px;
padding:32px;
border:1px solid #ffd6e0;
box-shadow:0 12px 30px rgba(255,120,150,0.25);
position:relative;
}

.title{
text-align:center;
font-size:28px;
letter-spacing:3px;
margin-bottom:20px;
font-weight:600;
color:#d81b60;
}

.divider{
height:1px;
background:#ffd6e0;
margin:22px 0;
}

.msg{
font-size:19px;
margin-bottom:10px;
}

.submsg{
font-size:17px;
margin-bottom:22px;
color:#444;
}

.row{
display:grid;
grid-template-columns:130px 1fr;
margin-bottom:16px;
}

/* Đổi sang màu đen */

.label{
color:#000;
font-weight:500;
}

.value{
border-bottom:1px dashed #ffc2d1;
padding:6px 0;
}

/* Link Ashtray màu đen */

a{
color:#000;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

.buttons{
margin-top:30px;
display:flex;
justify-content:center;
position:relative;
height:140px;
}

button{
padding:13px 26px;
font-size:16px;
border-radius:14px;
border:none;
cursor:pointer;
font-family:'Be Vietnam Pro', sans-serif;
}

.ok{
background:#ff4d8d;
color:white;
margin-right:40px;
box-shadow:0 6px 14px rgba(255,90,130,0.45);
}

.ok:hover{
background:#ff2f79;
}

.no{
background:#ffd6e0;
position:absolute;
left:60%;
top:0;
}

.footer{
margin-top:20px;
text-align:right;
font-style:italic;
font-size:18px;
color:#d81b60;
}

</style>

</head>

<body>

<div class="wrap">

<div class="card">

<div class="title">
THIỆP MỜI
</div>

<div class="divider"></div>

<div class="msg">
Dear Phương,
</div>

<div class="submsg">
Trân trọng kính mời chị Phương đi cùng với em một buổi tối
</div>


<div class="row">
<div class="label">Thời gian</div>
<div class="value">
Thứ 7, ngày 28/02/2026
</div>
</div>


<div class="row">
<div class="label">Địa điểm</div>
<div class="value">

<a href="https://www.instagram.com/ashtray_terracottahn/" target="_blank">
Ashtray | Terracotta
</a>

(📍 Số 31 Ngõ 19 Liễu Giai, Hà Nội)

</div>
</div>


<div class="divider"></div>


<div class="buttons">

<button class="ok"
onclick="alert('Hẹn gặp bạn iu nhé')">
Đồng ý
</button>


<button id="noBtn" class="no">
Không đồng ý
</button>


</div>


<div class="footer">
Hiếu
</div>

</div>

</div>


<script>

const noBtn = document.getElementById("noBtn");
const card = document.querySelector(".card");

function moveButton(){

const rect = card.getBoundingClientRect();

const x = Math.random()*(rect.width-140);
const y = Math.random()*(rect.height-140);

noBtn.style.left = x+"px";
noBtn.style.top = y+"px";

}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",moveButton);
noBtn.addEventListener("click",moveButton);

</script>

</body>
</html>
